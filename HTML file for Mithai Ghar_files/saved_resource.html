				<script>
					var Z_CDN_WHITELIST = [
						'cdn.jsdelivr.net',
						'cdnjs.cloudflare.com',
						'cdn.tailwindcss.com',
						'unpkg.com',
						'fonts.googleapis.com',
						'd3js.org',
						'cdn.babylonjs.com',
						'html2canvas.hertzen.com',
						'code.jquery.com',
						'cdn.datatables.net',
						'kit.fontawesome.com',
						'code.createjs.com',
						'cdn.plot.ly',
						'fonts.gstatic.com',
						'www.rgraph.net',
						'api.mapbox.com',
						'polyfill.io',
						'cdn.quilljs.com',
						'picsum.photos',
						'esm.sh'
					];

					function z_isUrlInWhitelist(url) {
						if (!url || typeof url !== 'string') {
							return false;
						}
						try {
							const urlObj = new URL(url);
							const hostname = urlObj.hostname;
							return Z_CDN_WHITELIST.some(domain => hostname === domain);
						} catch (e) {
							return false;
						}
					}

						function z_proxyCdnUrl(url) {
						if (!url || !url.startsWith('http')) {
							return url;
						}
							if (!z_isUrlInWhitelist(url)) {
							return url;
						}
						if (!url.startsWith('https://artifacts-cdn.chatglm.site/')) {
							return 'https://artifacts-cdn.chatglm.site/' + url;
						}
						return url;
					}
					
					// 增强版外部链接拦截 - 适合放在模板字符串中
					document.addEventListener('click', function (ev) {
						try {
							const anchor = ev.target?.closest?.('a[href]') || null;
							if (!anchor) return;

							let href = anchor.getAttribute('href')?.trim() || '';
							if (!href) return;

							if (href.startsWith('javascript:')) return;

							// 新需求：href="#" 的链接完全阻止跳转和任何行为
							if (href === '#') {
								ev.preventDefault();
								return;
							}

							// 处理其他内部锚点（如 #about、#contact 等）
							if (href.startsWith('#')) {
								const rawId = href.slice(1);
								if (!rawId) return;

								const id = decodeURIComponent(rawId);
								const target = 
									document.getElementById(id) ||
									document.querySelector('a[name="' + id.replace(/"/g, '\"') + '"]') ||
									document.querySelector('[name="' + id.replace(/"/g, '\"') + '"]');

								if (target && target.scrollIntoView) {
									ev.preventDefault();
									try {
										history.pushState(null, '', href);
									} catch (e) {}
									target.scrollIntoView({ behavior: 'smooth', block: 'start' });
								}
								return;
							}

							// 处理外部链接
							let url;
							try {
								url = new URL(href, window.location.href);
							} catch (e) {
								return;
							}

							if (url.protocol !== 'http:' && url.protocol !== 'https:') return;

							const isExternal = url.hostname !== window.location.hostname;

							if (isExternal || anchor.getAttribute('target') === '_blank') {
								ev.preventDefault();
								window.open(url.toString(), '_blank', 'noopener,noreferrer');
							}

						} catch (e) {
							// 出错时不阻止默认行为
						}
					}, true);

					// 1. 暴力清除函数：从 DOM 层面抹除 onclick 属性
					var Z_removeInlineOnclick = function () {
						// 专门锁定 href="#" 且带有 onclick 的 a 标签
						const targetedLinks = document.querySelectorAll('a[href="#"][onclick]');
						for (let i = 0; i < targetedLinks.length; i++) {
							targetedLinks[i].removeAttribute('onclick');
							targetedLinks[i].onclick = null; // 确保 JS 层的赋值也被清理
						}
					};
					// 3. 动态监测：防止页面通过异步加载重新生成带 onclick 的元素
					var z_observer = new MutationObserver(function () {
						Z_removeInlineOnclick();
					});

					z_observer.observe(document.documentElement, {
						childList: true,
						subtree: true,
						attributes: true,
						attributeFilter: ['onclick']
					});

					// 4. 初始化执行一次
					Z_removeInlineOnclick();

					const Z_rawCreateElement = document.createElement;

					document.createElement = function (tagName, ...args) {
						const el = Z_rawCreateElement.call(this, tagName, ...args);

						if (tagName.toLowerCase() === 'script') {
							const rawSetAttribute = el.setAttribute;
							const rawGetAttribute = el.getAttribute;
							let srcValue = '';
							
							el.setAttribute = function (name, value) {
								if (name === 'src' && typeof value === 'string') {
									value = z_proxyCdnUrl(value);
									srcValue = value;
								}
								return rawSetAttribute.call(this, name, value);
							};

							Object.defineProperty(el, 'src', {
								get: function() {
									return srcValue || rawGetAttribute.call(this, 'src') || '';
								},
								set: function(value) {
									if (typeof value === 'string') {
										srcValue = z_proxyCdnUrl(value);
										rawSetAttribute.call(this, 'src', srcValue);
									} else {
										srcValue = value;
									}
								},
								configurable: true,
								enumerable: true
							});
						}

						if (tagName.toLowerCase() === 'link') {
							const rawSetAttribute = el.setAttribute;
							const rawGetAttribute = el.getAttribute;
							let hrefValue = '';
							
							el.setAttribute = function (name, value) {
								if (name === 'href' && typeof value === 'string') {
									value = z_proxyCdnUrl(value);
									hrefValue = value;
								}
								return rawSetAttribute.call(this, name, value);
							};

							Object.defineProperty(el, 'href', {
								get: function() {
									return hrefValue || rawGetAttribute.call(this, 'href') || '';
								},
								set: function(value) {
									if (typeof value === 'string') {
										hrefValue = z_proxyCdnUrl(value);
										rawSetAttribute.call(this, 'href', hrefValue);
									} else {
										hrefValue = value;
									}
								},
								configurable: true,
								enumerable: true
							});
						}

						return el;
					};

					const Z_OriginalXMLHttpRequest = window.XMLHttpRequest;
					window.XMLHttpRequest = function (...args) {
						const xhr = new Z_OriginalXMLHttpRequest(...args);
						const rawOpen = xhr.open;

						xhr.open = function (method, url, ...rest) {
							if (typeof url === 'string') {
								const methodUpper = (method || '').toUpperCase();
								if (methodUpper === 'GET' && z_isUrlInWhitelist(url)) {
									url = z_proxyCdnUrl(url);
								}
							}
							return rawOpen.call(this, method, url, ...rest);
						};

						return xhr;
					};

					window.XMLHttpRequest.prototype = Z_OriginalXMLHttpRequest.prototype;
					Object.setPrototypeOf(window.XMLHttpRequest, Z_OriginalXMLHttpRequest);

					const z_originalFetch = window.fetch;
					window.fetch = async function (...args) {
						if (args.length > 0) {
							let url = '';
							let method = 'GET';
							
							if (typeof args[0] === 'string') {
								url = args[0];
								if (args[1] && args[1].method) {
									method = args[1].method.toUpperCase();
								}
								if (method === 'GET' && z_isUrlInWhitelist(url)) {
									args[0] = z_proxyCdnUrl(url);
								}
							} else if (args[0] instanceof Request) {
								const originalUrl = args[0].url;
								method = (args[0].method || 'GET').toUpperCase();
								if (method === 'GET' && z_isUrlInWhitelist(originalUrl)) {
									const proxiedUrl = z_proxyCdnUrl(originalUrl);
									if (proxiedUrl !== originalUrl) {
										args[0] = new Request(proxiedUrl, args[0]);
									}
								}
							}
						}
						return z_originalFetch.apply(this, args);
					};
				</script>
			</head>
			<body>

function importData(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.production && data.supply && data.sales && data.returns) {
        store = data;
        saveStore();
        renderPage(currentPage);
        showToast('Data imported successfully','success');
      } else { showToast('Invalid file format','error'); }
    } catch(err) { showToast('Failed to parse file','error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

let seed = 42;
function srand() { seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }

function generateSampleData() {
  seed=42;
  store={production:[],supply:[],sales:[],returns:[]};
  const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  for(let d=365;d>=0;d--){
    const date=new Date(today); date.setDate(date.getDate()-d);
    const ds=date.toISOString().split('T')[0], m=date.getMonth(), dow=date.getDay();
    const wm=(dow===0||dow===6)?1.25:1.0, mw=(m>=5&&m<=7)?1.8:1.0;
    SWEETS.forEach(sw=>{
      const sm=SEASON[sw.id][m]; if(sm<=0) return;
      const n=0.82+srand()*0.36, prod=Math.max(1,Math.round(sw.base*sm*wm*n));
      store.production.push({date:ds,sweetId:sw.id,qty:prod});
      let rem=prod;
      OUTLETS.forEach((o,idx)=>{
        const sup=idx===OUTLETS.length-1?rem:Math.max(0,Math.round(prod*o.share*(0.9+srand()*0.2)));
        rem-=sup; if(sup<=0) return;
        store.supply.push({date:ds,sweetId:sw.id,outletId:o.id,qty:sup});
        const sr=0.90+srand()*0.08, sold=Math.max(0,Math.round(sup*sr));
        store.sales.push({date:ds,sweetId:sw.id,outletId:o.id,qty:sold,revenue:sold*sw.price});
        const wq=sup-sold;
        if(wq>0){
          const r=srand(); let reason;
          if(r<0.6)reason='Unsold'; else if(r<0.8)reason='Expired'; else if(r<0.97*mw)reason='Damaged'; else reason='Theft';
          const wa=Math.min(wq,Math.max(0,Math.round(wq*(0.5+srand()*0.5))));
          if(wa>0) store.returns.push({date:ds,sweetId:sw.id,outletId:o.id,qty:wa,reason});
        }
      });
    });
  }
  saveStore();
}

/* ===== UTILITY ===== */
function fmt(n){return new Intl.NumberFormat('en-NP').format(n);}
function fmtRs(n){return 'Rs. '+fmt(n);}
function getSweet(id){return SWEETS.find(s=>s.id===id);}
function getOutlet(id){return OUTLETS.find(o=>o.id===id);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function getMonthYear(ds){const d=new Date(ds);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function filterByDate(a,ds){return a.filter(r=>r.date===ds);}
function filterByMonth(a,my){return a.filter(r=>getMonthYear(r.date)===my);}
function filterByYear(a,y){return a.filter(r=>r.date.startsWith(y));}
function sumQty(a){return a.reduce((s,r)=>s+r.qty,0);}
function sumRev(a){return a.reduce((s,r)=>s+(r.revenue||0),0);}
function getMonthStr(my){const[y,m]=my.split('-').map(Number);return FULL_MONTHS[m-1]+' '+y;}

  const c=document.getElementById('toast-container'),t=document.createElement('div');

}

  } else if(tab==='outlet'){
    const od=OUTLETS.map(o=>{const ys=sumQty(filterByYear(store.supply,yr).filter(r=>r.outletId===o.id)),yso=sumQty(filterByYear(store.sales,yr).filter(r=>r.outletId===o.id)),yr2=sumRev(filterByYear(store.sales,yr).filter(r=>r.outletId===o.id)),yw=sumQty(filterByYear(store.returns,yr).filter(r=>r.outletId===o.id)),yt=sumQty(filterByYear(store.returns,yr).filter(r=>r.outletId===o.id&&r.reason==='Theft'));return{...o,supplied:ys,sold:yso,revenue:yr2,waste:yw,theft:yt,util:ys>0?(yso/ys*100).toFixed(1):0,wasteRate:ys>0?(yw/ys*100).toFixed(1):0,theftRate:ys>0?(yt/ys*100).toFixed(2):0};});
    c.innerHTML=`<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">${od.map(o=>`<div class="kpi-card"><div class="flex items-center justify-between mb-2"><span class="font-bold">${o.name}</span><span class="badge badge-info">${o.code}</span></div><div class="text-sm"><span style="color:var(--muted)">Revenue:</span> <strong>${fmtRs(o.revenue)}</strong></div><div class="text-sm"><span style="color:var(--muted)">Supplied:</span> ${fmt(o.supplied)} kg</div><div class="text-sm"><span style="color:var(--muted)">Sold:</span> <span style="color:var(--success)">${fmt(o.sold)} kg (${o.util}%)</span></div><div class="text-sm"><span style="color:var(--muted)">Waste:</span> <span style="color:var(--danger)">${o.waste} kg (${o.wasteRate}%)</span></div><div class="text-sm"><span style="color:var(--muted)">Theft:</span> <span style="color:#6A1B9A;font-weight:600">${o.theft} kg (${o.theftRate}%)</span></div></div>`).join('')}</div><div class="chart-card"><h3 class="text-sm font-bold mb-3">Outlet Revenue Comparison (Monthly)</h3><canvas id="outletChart" height="200"></canvas></div>`;
    const lb=[],d1=[],d2=[],d3=[];for(let i=11;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const my=getMonthYear(d.toISOString());lb.push(ENG_MONTHS[d.getMonth()]);d1.push(sumRev(filterByMonth(store.sales,my).filter(r=>r.outletId===1)));d2.push(sumRev(filterByMonth(store.sales,my).filter(r=>r.outletId===2)));d3.push(sumRev(filterByMonth(store.sales,my).filter(r=>r.outletId===3)));}
    makeChart('outletChart',{type:'line',data:{labels:lb,datasets:[{label:'Yogikuti',data:d1,borderColor:'#E65100',tension:0.4,pointRadius:3},{label:'Devinagar',data:d2,borderColor:'#F9A825',tension:0.4,pointRadius:3},{label:'Golpark',data:d3,borderColor:'#2E7D32',tension:0.4,pointRadius:3}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmtRs(v),font:{size:10}}},x:{ticks:{font:{size:10}}}}}});
  }
}
function sweetDD(){
  const sid=Number(document.getElementById('sweet-select').value),sw=getSweet(sid),yr=todayStr().substring(0,4),dd=document.getElementById('sdd');
  const mp=[],ms=[],mw=[];for(let m=0;m<12;m++){const my=yr+'-'+String(m+1).padStart(2,'0');mp.push(sumQty(filterByMonth(store.production,my).filter(r=>r.sweetId===sid)));ms.push(sumQty(filterByMonth(store.sales,my).filter(r=>r.sweetId===sid)));mw.push(sumQty(filterByMonth(store.returns,my).filter(r=>r.sweetId===sid)));}
  let bm=0,wm=0;ms.forEach((v,i)=>{if(v>ms[bm])bm=i;if(v<ms[wm])wm=i;});
  dd.innerHTML=`<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4"><div class="p-3 rounded-lg" style="background:#FFF3E0"><div class="text-xs" style="color:var(--muted)">Category</div><div class="font-bold text-sm">${sw.cat}</div></div><div class="p-3 rounded-lg" style="background:#E8F5E9"><div class="text-xs" style="color:var(--muted)">Best Month</div><div class="font-bold text-sm" style="color:var(--success)">${FULL_MONTHS[bm]}</div></div><div class="p-3 rounded-lg" style="background:#FFEBEE"><div class="text-xs" style="color:var(--muted)">Lowest Month</div><div class="font-bold text-sm" style="color:var(--danger)">${FULL_MONTHS[wm]}</div></div><div class="p-3 rounded-lg" style="background:#E3F2FD"><div class="text-xs" style="color:var(--muted)">Price</div><div class="font-bold text-sm">${fmtRs(sw.price)}/kg</div></div></div><canvas id="sweetDeepChart" height="200"></canvas>`;
  makeChart('sweetDeepChart',{type:'bar',data:{labels:ENG_MONTHS,datasets:[{label:'Produced',data:mp,backgroundColor:'rgba(230,81,0,0.6)',borderRadius:4},{label:'Sold',data:ms,backgroundColor:'rgba(46,125,50,0.6)',borderRadius:4},{label:'Waste',data:mw,backgroundColor:'rgba(198,40,40,0.6)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10}}}}}});
}

/* ===== SEASONAL GUIDE ===== */
function renderSeasonal(c){
  const cm=new Date().getMonth(),nm=NEPALI_MONTHS[cm];
  let season='Winter';if(cm>=2&&cm<=4)season='Spring/Pre-Monsoon';else if(cm>=5&&cm<=7)season='Monsoon';else if(cm>=8&&cm<=9)season='Festival Season';else if(cm>=10&&cm<=11)season='Post-Monsoon/Autumn';
  const st={'Winter':{tip:'Focus on Gajar Halwa (carrot season), warm milk-based sweets. Demand is moderate but steady. Reduce seasonal items like Ghewar.',color:'#1565C0',icon:'snowflake'},'Spring/Pre-Monsoon':{tip:'Moderate demand. Prepare for Holi — increase Malpua and Gujiya production. Stock up on Kaju Katli for upcoming wedding season.',color:'#2E7D32',icon:'leaf'},'Monsoon':{tip:'Lower overall demand. Increase Rasgulla and Rasmalai. Watch for higher spoilage — reduce production by 20-30%. Monitor waste closely.',color:'#00838F',icon:'cloud-rain'},'Festival Season':{tip:'PEAK SEASON! Massively increase all sweet production. Kaju Katli and Motichoor Laddu for Dashain/Tihar gift boxes. Highest revenue months.',color:'#E65100',icon:'fire'},'Post-Monsoon/Autumn':{tip:'Demand normalizing after festivals. Clear remaining festival stock. Gradually return to standard production levels.',color:'#8D6E63',icon:'wind'}}[season];
  const hd=SWEETS.map(s=>{const m=SEASON[s.id].map(v=>v),mx=Math.max(...m,0.01);return{name:s.name,vals:m.map(v=>v/mx)};});
  const uf=FESTIVALS.filter(f=>f.month>=cm).slice(0,4);
  const recs=[['Jan','Poush','Gajar Halwa, Peda, Besan Laddu','Ghewar, Malpua','Moderate'],['Feb','Magh','Peda, Gajar Halwa, Gulab Jamun','Ghewar, Cham Cham','Moderate-High'],['Mar','Falgun','Peda, Malpua, Gulab Jamun','Ghewar, Gajar Halwa','High (Holi/Shivaratri)'],['Apr','Chaitra','Kaju Katli, Rasgulla, Barfi','Ghewar, Gajar Halwa','Moderate (New Year)'],['May','Baisakh','Gulab Jamun, Jalebi, Barfi','Ghewar, Gajar Halwa','Moderate'],['Jun','Jestha','Rasgulla, Jalebi, Cham Cham','Ghewar, Kaju Katli','Low (Monsoon)'],['Jul','Ashadh','Rasgulla, Rasmalai, Cham Cham','Ghewar, Gajar Halwa','Low (Monsoon)'],['Aug','Shrawan','Ghewar, Besan Laddu, Rasgulla','Gajar Halwa','Rising (Teej)'],['Sep','Bhadra','ALL SWEETS — Mass Production','None — Peak Season','VERY HIGH (Dashain)'],['Oct','Ashwin','Kaju Katli, Motichoor Laddu, Soan Papdi','Ghewar','VERY HIGH (Tihar)'],['Nov','Kartik','Normal mix, Peda, Rasgulla','Ghewar, Seasonal items','Normalizing'],['Dec','Mangsir','Gajar Halwa, Besan Laddu, Peda','Ghewar, Malpua','Moderate (Winter)']];
  c.innerHTML=`
    <div class="season-alert mb-6" style="border-left:4px solid ${st.color}"><div class="flex items-center gap-3 mb-2"><i class="fas fa-${st.icon} text-xl" style="color:${st.color}"></i><div><div class="font-bold text-sm">${nm} (${FULL_MONTHS[cm]}) — ${season}</div><div class="text-sm mt-1">${st.tip}</div></div></div></div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
      <div class="chart-card lg:col-span-2"><h3 class="text-sm font-bold mb-3"><i class="fas fa-th mr-2" style="color:var(--accent)"></i>Demand Intensity Heatmap</h3><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr><th style="text-align:left;padding:6px;min-width:100px"></th>${ENG_MONTHS.map(m=>`<th style="padding:4px;text-align:center;font-size:10px">${m}</th>`).join('')}</tr></thead><tbody>${hd.map(h=>`<tr><td style="padding:6px;font-weight:600;font-size:11px;white-space:nowrap">${h.name}</td>${h.vals.map(v=>{const bg=v<=0?'#F5F5F5':`rgba(230,81,0,${Math.max(0.08,v*0.9)})`,co=v>0.6?'#fff':(v<=0?'#ccc':'var(--fg)');return`<td style="padding:3px"><div class="heatmap-cell" style="background:${bg};color:${co}">${v<=0?'-':(v*100).toFixed(0)+'%'}</div></td>`;}).join('')}</tr>`).join('')}</tbody></table></div><div class="flex items-center gap-2 mt-3 text-xs" style="color:var(--muted)"><span>Low</span><div style="width:100px;height:8px;border-radius:4px;background:linear-gradient(to right,rgba(230,81,0,0.08),rgba(230,81,0,0.9))"></div><span>High</span></div></div>
      <div class="chart-card"><h3 class="text-sm font-bold mb-3"><i class="fas fa-calendar mr-2" style="color:var(--gold)"></i>Upcoming Festivals</h3><div class="flex flex-col gap-3">${uf.map(f=>`<div class="festival-card"><div class="font-bold text-sm">${f.name}</div><div class="text-xs mt-1" style="color:var(--muted)">${ENG_MONTHS[f.month]} / ${NEPALI_MONTHS[f.month]}</div><div class="text-xs mt-1"><strong>Key Sweets:</strong> ${f.sweets}</div><div class="mt-1"><span class="badge ${f.demand.includes('VERY')?'badge-danger':f.demand==='High'?'badge-warning':'badge-info'}">${f.demand}</span></div></div>`).join('')}</div></div>
    </div>
    <div class="chart-card mb-6"><h3 class="text-sm font-bold mb-3"><i class="fas fa-lightbulb mr-2" style="color:var(--gold)"></i>Production Recommendations by Month</h3><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Month</th><th>Nepali Month</th><th>Top Sweets to Produce</th><th>Sweets to Reduce</th><th>Demand</th></tr></thead><tbody>${recs.map((r,i)=>`<tr style="${i===cm?'background:#FFF8E0;font-weight:600':''}"><td>${r[0]}</td><td>${r[1]}</td><td style="color:var(--success)">${r[2]}</td><td style="color:var(--danger)">${r[3]}</td><td><span class="badge ${r[4].includes('VERY')?'badge-danger':r[4].includes('High')?'badge-warning':r[4].includes('Low')?'badge-danger':'badge-info'}">${r[4]}</span></td></tr>`).join('')}</tbody></table></div></div>
    <div class="chart-card"><h3 class="text-sm font-bold mb-3"><i class="fas fa-star mr-2" style="color:var(--gold)"></i>Complete Festival Reference</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${FESTIVALS.map(f=>`<div class="festival-card"><div class="flex items-center justify-between"><span class="font-bold text-sm">${f.name}</span><span class="badge ${f.demand.includes('VERY')?'badge-danger':f.demand==='High'?'badge-warning':'badge-info'}">${f.demand}</span></div><div class="text-xs mt-1" style="color:var(--muted)">${ENG_MONTHS[f.month]} / ${NEPALI_MONTHS[f.month]}</div><div class="text-xs mt-1">${f.sweets}</div></div>`).join('')}</div></div>`;
}

/* ===== DELETE RECORD ===== */
function delRec(type,idx,date){
  const arr=store[type].filter(r=>r.date===date);
  if(arr[idx]){const gi=store[type].indexOf(arr[idx]);if(gi>-1){store[type].splice(gi,1);saveStore();showToast('Record deleted','warning');renderPage(currentPage);}}
}

/* ===== INIT ===== */
document.getElementById('global-date').value=todayStr();
if(!loadStore()) generateSampleData();
renderPage('dashboard');
</script>
